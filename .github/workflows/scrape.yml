name: Refresh Mike Ball Availability

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
      timezone: "Australia/Sydney"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright + browser deps
        run: |
          pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run scraper in virtual visible browser
        run: |
          xvfb-run -a python scripts/scrape.py --window --out mikeball_availability.json --headful

      - name: Upload debug files if scraper fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mikeball-debug
          path: |
            debug_screen.png
            debug_page.html
          if-no-files-found: ignore

      - name: Show summary
        run: |
          echo "Wrote JSON:"
          ls -l mikeball_availability.json
          head -n 40 mikeball_availability.json || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mikeball_availability.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh Mike Ball availability [skip ci]"
            git push
          fi
